<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>
    <div class="dark-mode-toggle">
        <i class="fa-solid fa-moon" id="darkModeToggle"></i>
    </div>
    <div class="main-container">
        <div class="card" id="login-form">
            <h2>Welcome Back</h2>
            <p class="heading">Login to your account</p>
            
            <form id="login">
                <div class="input">
                    <label for="login-email">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                    </div>
                    <span class="error-message" id="login-email-error"></span>
                </div>

                <div class="input">
                    <label for="login-password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="login-password"></i>
                    </div>
                    <span class="error-message" id="login-password-error"></span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember me
                    </label>
                    <a href="#" class="forgot-password" id="forgotPasswordLink">Forgot Password?</a>
                </div>
                <button type="submit" class="submit-btn" disabled>Login</button>
            </form>

            <div class="toggle-container">
                <p>Don't have an account? <a type="button" class="toggle-btn" id="signup-btn" href="signup.html" style="text-decoration: none;">Sign Up</button></a>
            </div>
        </div>
    </div>
