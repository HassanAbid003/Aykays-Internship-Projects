<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dark-mode-toggle">
        <i class="fa-solid fa-moon" id="darkModeToggle"></i>
    </div>

    <div class="main-container">
        <div class="card" id="signup-form">
            <h2>Create Account</h2>
            <p class="heading">Join us today</p>
            
            <form id="signup">
                <div class="input">
                    <label for="signup-name">Full Name</label>
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="signup-name" name="name" placeholder="Enter your full name" required>
                    </div>
                    <span class="error-message" id="signup-name-error"></span>
                </div>

                <div class="input">
                    <label for="signup-email">Email</label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="signup-email" name="email" placeholder="Enter your email" required>
                    </div>
                    <span class="error-message" id="signup-email-error"></span>
                </div>

                <div class="input">
                    <label for="signup-password">Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-password" name="password" placeholder="Create a password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="signup-password"></i>
                    </div>
                    <span class="error-message" id="signup-password-error"></span>
                </div>

                <div class="input">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signup-confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                        <i class="fas fa-eye-slash toggle-password" data-target="signup-confirm-password"></i>
                    </div>
                    <span class="error-message" id="signup-confirm-error"></span>
                </div>

                <button type="submit" class="submit-btn" disabled>Sign Up</button>
            </form>

            <div class="toggle-container">
                <p>Already have an account? <a type="button" class="toggle-btn" href="index.html" id="login-btn" style="text-decoration: none;">Login</a></p>
            </div>
        </div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</body>
