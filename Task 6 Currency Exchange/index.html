<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter | Live Exchange Rates</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #0a0a0c;
  --surface: #141418;
  --surface2: #1c1c22;
  --border: rgba(255, 255, 255, 0.06);
  --border2: rgba(255, 255, 255, 0.12);
  --text: #f2efe9;
  --muted: #9ca3af;
  --accent: #e2bc7c;
  --accent-dim: rgba(226, 188, 124, 0.1);
  --green: #5fcf8a;
  --red: #e86a6a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  padding: 2rem 1rem 3rem;
}

.app {
  max-width: 560px;
  margin: 0 auto;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 2rem;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 2.3rem;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff 0%, #e2bc7c 100%);
  background-clip: text;
  color: transparent;
}

.header p {
  color: var(--muted);
  font-size: 0.8rem;
  margin-top: 0.4rem;
}

/* Cards */
.card, .hist-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 28px;
  padding: 1.6rem;
  margin-bottom: 1.2rem;
}

.row-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 0.6rem;
}

/* Amount Input */
.amt-wrap {
  margin-bottom: 1.4rem;
}

input[type=number] {
  width: 100%;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 22px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 1.6rem;
  font-weight: 500;
  padding: 0.85rem 1.2rem;
}

input[type=number]:focus {
  outline: none;
  border-color: var(--accent);
}

.input-error {
  border-color: var(--red) !important;
}

/* Currency Row */
.currency-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  margin-bottom: 1.4rem;
}

.currency-col {
  flex: 1;
  min-width: 0;
}

.sel-box {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 18px;
  padding: 0.75rem 1rem;
}

.sel-box:focus-within {
  border-color: var(--accent);
}

.flag-badge {
  font-size: 1.6rem;
  line-height: 1;
  flex-shrink: 0;
}

.sel-inner {
  position: relative;
  flex: 1;
  min-width: 0;
}

select {
  width: 100%;
  background: #1c1c22;
  border: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  padding-right: 1.2rem;
  cursor: pointer;
}

select:focus {
  outline: none;
}

.arrow {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 0.75rem;
  pointer-events: none;
}

/* Swap Button */
.swap-col {
  display: flex;
  align-items: flex-end;
  padding-bottom: 2px;
}

.swap-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--accent-dim);
  border: 0.5px solid var(--accent);
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.swap-btn:hover {
  background: var(--accent-glow);
  transform: scale(1.05);
}

.swap-btn.spin {
  transform: rotate(180deg);
}

/* Result Box */
.result-box {
  background: linear-gradient(135deg, rgba(226,188,124,0.08), rgba(226,188,124,0.02));
  border: 0.5px solid rgba(226, 188, 124, 0.3);
  border-radius: 24px;
  padding: 1.2rem;
  margin-top: 1rem;
  text-align: center;
}

.result-amount {
  font-family: 'DM Mono', monospace;
  font-size: 1.7rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  word-break: break-word;
}

.result-rate {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 10px;
  border-top: 0.5px solid rgba(226, 188, 124, 0.2);
  padding-top: 10px;
}

/* Convert Button */
.convert-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 20px;
  color: #0a0a0c;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  padding: 1rem;
  cursor: pointer;
  margin-top: 1.2rem;
}

.convert-btn:hover {
  opacity: 0.88;
  transform: scale(0.98);
}

.convert-btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--muted);
  font-size: 0.83rem;
  padding: 0.8rem 0;
}

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.2s ease-in-out infinite;
}

.dot:nth-child(2) {
  animation-delay: 0.2s;
}

.dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes pulse {
  0%, 80%, 100% {
    opacity: 0.2;
  }
  40% {
    opacity: 1;
  }
}

/* Error Message */
.error-msg {
  background: rgba(232, 106, 106, 0.1);
  border: 0.5px solid rgba(232, 106, 106, 0.3);
  border-radius: 16px;
  color: var(--red);
  font-size: 0.82rem;
  padding: 0.7rem 1rem;
  margin-top: 0.8rem;
  text-align: center;
}

/* History */
.hist-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.9rem;
}

.hist-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 500;
}

.clear-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.76rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  padding: 4px 10px;
  border-radius: 8px;
}

.clear-btn:hover {
  color: var(--red);
  background: rgba(232, 106, 106, 0.1);
}

.hist-empty {
  color: var(--muted);
  font-size: 0.83rem;
  text-align: center;
  padding: 1rem 0;
  font-style: italic;
}

.hist-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.7rem 0;
  border-bottom: 0.5px solid var(--border);
}

.hist-item:last-child {
  border-bottom: none;
}

.hist-from {
  font-family: 'DM Mono', monospace;
  font-size: 0.85rem;
  color: var(--text);
}

.hist-time {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 3px;
}

/* Status */
.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 1.2rem;
  justify-content: center;
}

.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot-green {
  background: var(--green);
}

.dot-amber {
  background: var(--accent);
}

.dot-red {
  background: var(--red);
}

/* Simple Animations */
@keyframes fadeSlide {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.result-box, .hist-item {
  animation: fadeSlide 0.25s ease-out;
}
</style>
</head>
<body>
<div class="app">

    <h1>Currency <span style="background:linear-gradient(135deg,#e2bc7c,#ffffff);background-clip:text;-webkit-background-clip:text;color:transparent">Exchange</span></h1>

  </div>

        </div>
      </div>
    </div>
 
    <!-- Loading / Error / Result -->

      <span>Fetching live rates...</span>
    </div>

    <div class="result-rate" id="resRate"></div>

    <!-- Convert button -->

  <!-- History -->

    </div>

  </div>
 
  <div class="status">
    <span class="status-dot dot-green" id="statusDot"></span>
    <span id="statusTxt">Ready · Using open.er-api.com</span>
  </div>
 
</div>

// API configuration
const API_URL = "https://open.er-api.com/v6/latest/USD";
let currentRates = null;
let lastFetchTime = 0;
const CACHE_DURATION = 5 * 60 * 1000;
let history = [];
let chart = null;

// DOM elements
const fromSelect = document.getElementById("fromSel");
const toSelect = document.getElementById("toSel");
const amountInput = document.getElementById("amount");
const convertBtn = document.getElementById("convertBtn");
const swapBtn = document.getElementById("swapBtn");
const clearBtn = document.getElementById("clearBtn");
const fromFlag = document.getElementById("fromFlag");
const toFlag = document.getElementById("toFlag");
const loadingEl = document.getElementById("loadingEl");
const errorEl = document.getElementById("errorEl");
const resultEl = document.getElementById("resultEl");
const resAmount = document.getElementById("resAmount");
const resRate = document.getElementById("resRate");
const histList = document.getElementById("histList");
const statusTxt = document.getElementById("statusTxt");
const statusDot = document.getElementById("statusDot");

// Function to get flag image URL from flagsapi.com
function getFlagUrl(currencyCode) {
  const countryCode = countryCodeMap[currencyCode] || "UN";
  return `https://flagsapi.com/${countryCode}/flat/64.png`;
}

// Update flag images
function updateFlags() {
  const fromCurrency = fromSelect.value;
  const toCurrency = toSelect.value;
  
  fromFlag.innerHTML = `<img src="${getFlagUrl(fromCurrency)}" alt="${fromCurrency}" style="width: 32px; height: 32px; object-fit: cover; border-radius: 4px;">`;
  toFlag.innerHTML = `<img src="${getFlagUrl(toCurrency)}" alt="${toCurrency}" style="width: 32px; height: 32px; object-fit: cover; border-radius: 4px;">`;
}

// Fetch exchange rates
async function fetchAllRates() {
  const now = Date.now();
  if (currentRates && (now - lastFetchTime) < CACHE_DURATION) return currentRates;
  
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error(`API Error: ${response.status}`);
    const data = await response.json();
    currentRates = data.rates;
    lastFetchTime = now;
    statusTxt.textContent = `Ready · Updated ${new Date().toLocaleTimeString()}`;
    statusDot.className = "status-dot dot-green";
    return currentRates;
  } catch (error) {
    throw new Error("Failed to fetch exchange rates");
  }
}

// Get exchange rate between two currencies
async function getExchangeRate(from, to) {
  if (from === to) return 1;
  const rates = await fetchAllRates();
  const fromRate = rates[from];
  const toRate = rates[to];
  if (!fromRate || !toRate) throw new Error(`Currency not supported`);
  return toRate / fromRate;
}

// Initialize dropdowns with flags and currency names
async function initDropdowns() {
  try {
    const rates = await fetchAllRates();
    const currencies = Object.keys(rates).sort();
    fromSelect.innerHTML = '';
    toSelect.innerHTML = '';
    
    currencies.forEach(currency => {
      const currencyName = currencyNames[currency] || currency;
      const flagUrl = getFlagUrl(currency);
      const displayText = `${currency} - ${currencyName}`;
      
      const fromOption = document.createElement('option');
      fromOption.value = currency;
      fromOption.textContent = displayText;
      fromOption.setAttribute('data-flag', flagUrl);
      if (currency === "PKR") fromOption.selected = true;
      fromSelect.appendChild(fromOption);
      
      const toOption = document.createElement('option');
      toOption.value = currency;
      toOption.textContent = displayText;
      toOption.setAttribute('data-flag', flagUrl);
      if (currency === "USD") toOption.selected = true;
      toSelect.appendChild(toOption);
    });
    
    updateFlags();
    loadHistory();
    setTimeout(() => convert(), 500);
  } catch (error) {
    errorEl.textContent = "Failed to load currencies. Please refresh the page.";
    errorEl.style.display = "block";
  }
}

// Perform conversion
async function convert() {
  const from = fromSelect.value;
  const to = toSelect.value;
  const amount = parseFloat(amountInput.value);
  
  errorEl.style.display = "none";
  resultEl.style.display = "none";
  amountInput.classList.remove("input-error");
  
  if (isNaN(amount) || amount <= 0) {
    amountInput.classList.add("input-error");
    errorEl.textContent = "Please enter a valid amount greater than 0";
    errorEl.style.display = "block";
    return;
  }
  
  loadingEl.style.display = "flex";
  convertBtn.disabled = true;
  statusTxt.textContent = "Converting...";
  statusDot.className = "status-dot dot-amber";
  
  try {
    const rate = await getExchangeRate(from, to);
    const converted = amount * rate;
    displayResult(amount, from, converted, to, rate);
    addToHistory(from, to, amount, converted);
    statusTxt.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    statusDot.className = "status-dot dot-green";
  } catch (error) {
    errorEl.textContent = error.message || "Failed to convert. Please try again.";
    errorEl.style.display = "block";
    statusTxt.textContent = "Conversion failed";
    statusDot.className = "status-dot dot-red";
  } finally {
    loadingEl.style.display = "none";
    convertBtn.disabled = false;
  }
}

// Display conversion result
function displayResult(amount, from, converted, to, rate) {
  resAmount.textContent = `${amount.toFixed(2)} ${from} = ${converted.toFixed(2)} ${to}`;
  resRate.textContent = `1 ${from} = ${rate.toFixed(6)} ${to}  ·  1 ${to} = ${(1/rate).toFixed(6)} ${from}`;
  resultEl.style.display = "block";
}

// Add conversion to history
function addToHistory(from, to, amount, result) {
  history.unshift({
    from, to,
    amount: amount.toFixed(2),
    result: result.toFixed(4),
    time: new Date().toLocaleTimeString(),
    date: new Date().toLocaleDateString()
  });
  if (history.length > 10) history.pop();
  localStorage.setItem('currency_history', JSON.stringify(history));
  renderHistory();
}

// Load history from localStorage
function loadHistory() {
  const saved = localStorage.getItem('currency_history');
  if (saved) {
    try {
      history = JSON.parse(saved);
      renderHistory();
    } catch(e) {}
  }
}

// Render history list
function renderHistory() {
  if (history.length === 0) {
    histList.innerHTML = '<p class="hist-empty">No conversions yet.</p>';
    return;
  }
  
  histList.innerHTML = history.map(item => `
    <div class="hist-item">
      <div>
        <div class="hist-from">${item.amount} ${item.from} → ${item.result} ${item.to}</div>
        <div class="hist-time">${item.date} ${item.time}</div>
      </div>
    </div>
  `).join('');
}

// Clear history
function clearHistoryHandler() {
  history = [];
  localStorage.removeItem('currency_history');
  renderHistory();
  statusTxt.textContent = "History cleared";
  setTimeout(() => {
    statusTxt.textContent = "Ready · Using open.er-api.com";
  }, 2000);
}

// Swap currencies
function swapCurrencies() {
  const temp = fromSelect.value;
  fromSelect.value = toSelect.value;
  toSelect.value = temp;
  updateFlags();
  swapBtn.classList.add('spin');
  setTimeout(() => swapBtn.classList.remove('spin'), 300);
  convert();
}

// Save preferences
function savePreferences() {
  localStorage.setItem('currency_preferences', JSON.stringify({
    from: fromSelect.value,
    to: toSelect.value
  }));
}

// Load preferences
function loadPreferences() {
  const saved = localStorage.getItem('currency_preferences');
  if (saved) {
    try {
      const p = JSON.parse(saved);
      if (p.from) fromSelect.value = p.from;
      if (p.to) toSelect.value = p.to;
      updateFlags();
    } catch(e) {}
  }
}

// Event listeners
fromSelect.addEventListener("change", () => {
  updateFlags();
  savePreferences();
  convert();
});

toSelect.addEventListener("change", () => {
  updateFlags();
  savePreferences();
  convert();
});

amountInput.addEventListener("input", () => {
  if (amountInput.value && parseFloat(amountInput.value) > 0) convert();
});

amountInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") convert();
});

convertBtn.addEventListener("click", convert);
swapBtn.addEventListener("click", swapCurrencies);
clearBtn.addEventListener("click", clearHistoryHandler);

// Initialize the app
async function init() {
  loadPreferences();
  await initDropdowns();
}

// Start the app
init();
</Script>
